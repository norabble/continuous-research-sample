name: decline

on:
  pull_request:
    types: [closed]

# The engine writes (the decline record lands on main) with the App token
# minted below — the protect-main ruleset only lets the App and the admin
# push there, so the default token stays read-only.
permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  record-decline:
    # Only closed-unmerged data-PRs. (Data-PRs are bot-authored, so an external
    # user can't close one; the engine also no-ops defensively otherwise.)
    if: >-
      github.event.pull_request.merged == false &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'data:')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24" # npm 11: npm 10 (node 22) cannot install commit-pinned git deps (GitFetcher/Arborist bug)
      - name: Mint App installation token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.CONTINUOUS_RESEARCH_APP_ID }}
          private-key: ${{ secrets.CONTINUOUS_RESEARCH_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: read
          permission-pull-requests: read
      - name: record-decline
        # Engine v0.1.6, pinned to its commit (runs with the App token in env).
        # The engine reads the event from GITHUB_EVENT_PATH (auto-set by Actions);
        # no event data is interpolated into the shell.
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: npx --yes github:norabble/continuous-research#271847a86fc9ed6ba6b9548314369fa593ea019d record-decline
