name: sense

on:
  # Daily, shortly after the UTC day completes (the sensor's edition boundary).
  # The engine's dedup makes re-runs safe at any frequency.
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      descriptor:
        description: "Edition to sense (skeleton sets SAMPLE_DESCRIPTOR)"
        required: false
        default: ""

# Serialize runs: the load-bearing TOCTOU guard, so two runs can't both see
# "new" and double-propose.
concurrency:
  group: sense
  cancel-in-progress: false

# The engine writes with the App token below (data-PRs must be App-authored so
# they can trigger the gh-aw interpretation workflow — default-token PRs don't
# trigger downstream workflows). The workflow's own token stays read-only.
permissions:
  contents: read

jobs:
  sense:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Mint App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CONTINUOUS_RESEARCH_APP_ID }}
          private-key: ${{ secrets.CONTINUOUS_RESEARCH_APP_PRIVATE_KEY }}
      - name: sense
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          SAMPLE_DESCRIPTOR: ${{ inputs.descriptor }}
        run: npx --yes github:norabble/continuous-research#v0.1.5 sense
      - name: Escalate drift to the sensor-drift issue
        # The drift report is ephemeral working-tree state; the issue is the
        # durable record the repair agent reads. One open issue = escalation
        # dedup (re-runs comment instead of re-filing). App token: Issues R/W.
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          [ -f .research/drift/report.json ] || exit 0
          gh label create sensor-drift \
            --description "Sensor cannot produce an edition from its declared source" \
            --color B60205 --force
          report="$(cat .research/drift/report.json)"
          body="$(printf 'The sense run could not produce an edition — the sensor is broken or its source moved.\n\nDrift report:\n\n```json\n%s\n```\n\nRepair contract: propose a fix PR editing **sensor.mjs only** (SOURCE + fetchEntries), using a source whose host is NOT in `.research/source-firewall.json`. Close this issue via `Fixes #N` in the PR.' "$report")"
          number="$(gh issue list --label sensor-drift --state open --json number --jq '.[0].number // empty')"
          if [ -n "$number" ]; then
            gh issue comment "$number" --body "$body"
          else
            url="$(gh issue create --title "sensor drift: cannot produce an edition" \
              --label sensor-drift --body "$body")"
            number="${url##*/}"
          fi
          # Lock the issue: the repair agent treats its content as instructions,
          # so on a public repo an open comment thread is a prompt-injection
          # channel. Locking limits comments to collaborators; the App (write
          # access) can still post the dedup comment above on re-runs. REST
          # lock is idempotent, so re-locking is a no-op.
          gh api -X PUT "repos/${GITHUB_REPOSITORY}/issues/${number}/lock"
