name: sense

on:
  # Daily, shortly after the UTC day completes (the sensor's edition boundary).
  # The engine's dedup makes re-runs safe at any frequency.
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      descriptor:
        description: "Edition to sense (skeleton sets SAMPLE_DESCRIPTOR)"
        required: false
        default: ""

# Serialize runs: the load-bearing TOCTOU guard, so two runs can't both see
# "new" and double-propose.
concurrency:
  group: sense
  cancel-in-progress: false

# The engine writes with the App token below (data-PRs must be App-authored so
# they can trigger the gh-aw interpretation workflow — default-token PRs don't
# trigger downstream workflows). The workflow's own token stays read-only.
permissions:
  contents: read

jobs:
  sense:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Mint App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: sense
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          SAMPLE_DESCRIPTOR: ${{ inputs.descriptor }}
        run: node engine/continuous-research.mjs sense
