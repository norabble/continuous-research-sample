name: site

on:
  # pull_request_target, not pull_request: the run stays in base context
  # (github.ref = refs/heads/main), which the github-pages environment's
  # main-only branch policy accepts — pull_request runs deploy from
  # refs/pull/N/merge and are rejected before any step. Safe here: the
  # checkout below is the base ref (no PR code is executed); the build reads
  # PR content via the GitHub API and the engine sanitizes it; and the data:
  # label gate keeps fork PRs out (labels are App/maintainer-set only).
  pull_request_target:
    types: [opened, synchronize, reopened, closed]
  push:
    branches: [main]
    paths: ["findings.md", ".research/**"]
  # The interpretation agent pushes the impact commit with GITHUB_TOKEN, and
  # token-caused synchronize events cannot trigger workflow runs — this daily
  # rebuild (after 00:30 sense + interpretation) picks those up.
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: site
  cancel-in-progress: true

jobs:
  build-deploy:
    # PR events matter only for data-PRs (the pending-updates section);
    # pushes to main and manual dispatch always rebuild.
    if: >-
      github.event_name != 'pull_request_target' ||
      contains(join(github.event.pull_request.labels.*.name, ','), 'data:')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24" # npm 11: npm 10 (node 22) cannot install commit-pinned git deps (GitFetcher/Arborist bug)
      - name: build
        # Engine v0.1.6, pinned to its commit.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes github:norabble/continuous-research#271847a86fc9ed6ba6b9548314369fa593ea019d site
      # Inlined actions/upload-pages-artifact: the composite internally calls
      # actions/upload-artifact by tag, which the repo's required-SHA-pinning
      # policy rejects (it applies to nested references too). These two steps
      # are exactly what the composite does. (Skipped when the build produced
      # no _site/, e.g. site.enabled=false — a green no-op, per the scaffold.)
      - name: Package site for Pages
        if: hashFiles('_site/**') != ''
        run: tar --dereference --hard-dereference -cvf "$RUNNER_TEMP/artifact.tar" -C _site .
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: hashFiles('_site/**') != ''
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error
      - id: deploy
        if: hashFiles('_site/**') != ''
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
